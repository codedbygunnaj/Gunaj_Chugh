  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  
  <script>
    async function loadProjects() {
        const res = await fetch(
            "https://api.github.com/users/codedbygunnaj/repos",
            {
                headers: {
                    Accept: "application/vnd.github.mercy-preview+json"
                }
            }
        );

        const data = await res.json();
        const container = document.getElementById("projects-container");

        const filtered = data.filter(repo =>
            repo.topics && repo.topics.includes("featured")
        );

        filtered.sort((a, b) => b.stargazers_count - a.stargazers_count);
        filtered.slice(0, 9).forEach(repo => {

            const imageUrl = `https://raw.githubusercontent.com/${repo.owner.login}/${repo.name}/${repo.default_branch}/preview.png`;

            const card = `
                <div class="col-md-4 mb-4">
                <div class="project-card">

                    <div class="img-wrapper">
                    <img src="${imageUrl}" 
                        onerror="this.onerror=null; this.src='/utils/githubProject.webp';">

                    <div class="overlay">
                        <a href="${repo.html_url}" target="_blank" class="btn btn-light btn-sm">
                        View Code
                        </a>
                        ${repo.homepage ? `
                        <a href="${repo.homepage}" target="_blank" class="btn btn-success btn-sm ms-2">
                            Live
                        </a>
                        ` : ""}
                    </div>
                    </div>

                    <div class="card-content">
                    <h5>${repo.name}</h5>
                    <p>${repo.description || "No description available"}</p>
                    <span class="badge bg-primary">${repo.language || "C++"}</span>
                    </div>

                </div>
                </div>
            `;

            container.innerHTML += card;
        });
    }

    loadProjects();
  </script>
